server {
    server_name dev.getquantum.app;

    access_log /var/log/nginx/dev_app_access.log;
    error_log  /var/log/nginx/dev_app_error.log warn;

    client_max_body_size 50M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Headers comunes a todos los proxy_pass
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    # --- Webhook TradingView y Telegram ---
    location /webhook {
        limit_req zone=webhook_limit burst=15 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8101;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    # --- Auth: límite anti brute-force ---
    location /auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8101;
        proxy_read_timeout 30s;
    }

    # --- Health check sin rate limit ni logs ---
    location = /health {
        proxy_pass http://127.0.0.1:8101;
        access_log off;
    }

    # --- API y WebSocket / rutas compartidas con React Router ---
    location ~ ^/(users|bots|exchange-accounts|exchange-trades|paper-trading|positions|analytics|ws|manual-trade|optimizer|charting|trading-signals|chat|ai|portfolio|montecarlo|admin)(/.*)?$ {
        set $upstream http://127.0.0.1:8101;
        if ($http_accept ~* "text/html") {
            set $upstream http://127.0.0.1:8081;
        }

        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;
        proxy_pass $upstream;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Frontend React SPA ---
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_read_timeout 300s;
    }

    listen 80;
}
