services:

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis (cache + broker Celery + pub/sub)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $(grep '^requirepass' /usr/local/etc/redis/redis.conf | awk '{print $2}') ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # PgBouncer (connection pooler for PostgreSQL)
  # ─────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    expose:
      - "6432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${POSTGRES_USER} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Backend (FastAPI)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8100}:8000"
    volumes:
      - ./backend/ai/models:/app/ai/models
      - ./backend/ai/knowledge:/app/ai/knowledge:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ─────────────────────────────────────────
  # Celery Worker (executes tasks)
  # ─────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/ai/models:/app/ai/models
    command: >
      celery -A app.services.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=orders,sl_updates,notifications,default

  # ─────────────────────────────────────────
  # Celery Beat (periodic tasks scheduler)
  # Tareas programadas:
  #   - cleanup_old_logs: diario a las 2 AM
  #   - check_exchanges: cada 5 minutos
  # ─────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/ai/models:/app/ai/models
      - celery_beat_data:/app/celerybeat-data
    command: >
      celery -A app.services.celery_app beat
      --loglevel=info
      --schedule=/app/celerybeat-data/celerybeat-schedule

  # ─────────────────────────────────────────
  # Ollama Bridge (SSH tunnel → host localhost:11434)
  # Expone el Ollama del portátil (via VSCode forward) a los contenedores
  # ─────────────────────────────────────────
  ollama-bridge:
    image: alpine:3.19
    restart: unless-stopped
    command: >
      sh -c "apk add --no-cache openssh-client &&
      ssh -N
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o ServerAliveInterval=30
      -o ServerAliveCountMax=3
      -o ExitOnForwardFailure=yes
      -i /ssh/id_ed25519
      -L 0.0.0.0:11434:127.0.0.1:11434
      deploy@172.18.0.1"
    volumes:
      - /home/deploy/.ssh:/ssh:ro
    expose:
      - "11434"

  # ─────────────────────────────────────────
  # Frontend (React + Vite)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"

volumes:
  postgres_data:
  redis_data:
  celery_beat_data:
