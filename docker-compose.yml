services:

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis (cache + broker Celery + pub/sub)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6380:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Backend (FastAPI)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8100:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ─────────────────────────────────────────
  # Celery Worker (executes tasks)
  # ─────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.services.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=orders,sl_updates,notifications,default

  # ─────────────────────────────────────────
  # Celery Beat (periodic tasks scheduler)
  # Tareas programadas:
  #   - cleanup_old_logs: diario a las 2 AM
  #   - check_exchanges: cada 5 minutos
  # ─────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - celery_beat_data:/app/celerybeat-data
    command: >
      celery -A app.services.celery_app beat
      --loglevel=info
      --schedule=/app/celerybeat-data/celerybeat-schedule

  # ─────────────────────────────────────────
  # Frontend (React + Vite)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
  celery_beat_data:
