# Persistencia AOF (Append Only File)
appendonly yes
appendfsync everysec

# Persistencia RDB (snapshot cada 15 min si hay cambios)
save 900 1
save 300 10

# Límite de memoria (ajustar según RAM disponible)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Protección básica
protected-mode no
bind 0.0.0.0

# Autenticación (debe coincidir con REDIS_PASSWORD del .env)
requirepass de03b8a8d05b935d8fb743c22769aecc03efef478138669139ae87761d622d8d
