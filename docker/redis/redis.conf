# Persistencia AOF (Append Only File)
appendonly yes
appendfsync everysec

# Persistencia RDB (snapshot cada 15 min si hay cambios)
save 900 1
save 300 10

# Límite de memoria (ajustar según RAM disponible)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Protección básica
protected-mode no
bind 0.0.0.0
