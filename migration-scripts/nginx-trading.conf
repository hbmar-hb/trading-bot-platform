# Configuracion Nginx para Trading Bot Platform
# Copiar a: /etc/nginx/sites-available/trading
# Activar: ln -s /etc/nginx/sites-available/trading /etc/nginx/sites-enabled/
# SSL: certbot --nginx -d TU_DOMINIO

server {
    listen 80;
    server_name _;  # Cambiar por tu dominio, ej: trading.tudominio.com

    # Logs
    access_log /var/log/nginx/trading_access.log;
    error_log /var/log/nginx/trading_error.log;

    # Frontend React (Docker container expuesto en puerto 80)
    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend FastAPI API
    location /api/ {
        proxy_pass http://localhost:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://localhost:8100/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Healthcheck directo al backend (util para monitoreo)
    location /health {
        proxy_pass http://localhost:8100/health;
        access_log off;
    }
}
