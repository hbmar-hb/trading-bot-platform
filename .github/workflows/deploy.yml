name: Auto Deploy

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: [self-hosted, Linux]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Copy .env file
        run: cp /home/deploy/apps/trading-bot-platform/.env .env

      - name: Stop containers
        run: docker compose -f docker-compose.yml down --remove-orphans || true

      - name: Prune old images
        run: docker image prune -f

      - name: Build and start
        run: docker compose -f docker-compose.yml up -d --build

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8100/docs > /dev/null; then
              echo "Backend OK"
              exit 0
            fi
            echo "Intento $i/30..."
            sleep 2
          done
          echo "Backend no respondió"
          exit 1
