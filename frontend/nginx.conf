server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Rutas del backend — captura con y sin trailing slash
    location ~ ^/(auth|users|bots|exchange-accounts|exchange-trades|paper-trading|positions|analytics|webhook|health|ws|manual-trade)(/.*)?$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
    }

    # React Router — todo lo demas va al frontend
    location / {
        try_files $uri $uri/ /index.html;
    }
}
