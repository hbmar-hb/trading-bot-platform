server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Usar el resolver de Docker para re-resolver nombres cada 10s (evita IP cacheada tras restart)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Rutas exactas de React Router: servir la SPA (index.html).
    # Esto permite recargar /bots, /ai, /chart, etc. sin que nginx las envíe al backend.
    location = /bots                                { try_files /index.html =404; }
    location = /bots/new                            { try_files /index.html =404; }
    location ~ ^/bots/[a-f0-9-]+/edit$              { try_files /index.html =404; }
    location ~ ^/bots/[a-f0-9-]+/activity$          { try_files /index.html =404; }
    location ~ ^/bots/[a-f0-9-]+/optimizer$         { try_files /index.html =404; }
    location ~ ^/bots/[a-f0-9-]+/effectiveness$     { try_files /index.html =404; }
    location = /ai                                  { try_files /index.html =404; }
    location = /chart                               { try_files /index.html =404; }
    location = /chat                                { try_files /index.html =404; }
    location = /paper-trading                       { try_files /index.html =404; }
    location = /positions                           { try_files /index.html =404; }
    location = /analytics                           { try_files /index.html =404; }
    location = /manual-trading                      { try_files /index.html =404; }
    location = /exchange-accounts                   { try_files /index.html =404; }
    location = /exchange-trades                     { try_files /index.html =404; }
    location = /settings                            { try_files /index.html =404; }
    location = /users                               { try_files /index.html =404; }
    location = /optimizer-db                        { try_files /index.html =404; }

    # API proxy: el frontend usa VITE_API_URL=/api, se reescribe y se envía al backend
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend http://backend:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
    }

    # Rutas del backend (compatibilidad directa sin /api)
    location ~ ^/(auth|users|bots|exchange-accounts|exchange-trades|paper-trading|positions|analytics|webhook|health|ws|manual-trade|optimizer|charting|trading-signals|chat|ai|assistant)(/.*)?$ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
    }

    # Cache agresiva para assets hasheados (nunca cambian de nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router — todo lo demas va al frontend (SIN CACHE)
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }
}
